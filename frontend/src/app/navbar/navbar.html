<nav class="flex items-center justify-center gap-[19px] py-6 bg-primary">
  <img src="images/giftpet-logo.svg" alt="Giftpet logo"/>
  <ul class="flex items-center justify-center gap-[19px]">
    @for (action of actions; track action.type) {
      <li>
        <button
          type="button"
          class="cursor-pointer rounded-sm border-[4px] border-transparent p-[10px] font-['Poppins'] text-[14px] font-normal transition-colors hover:border-black/10 hover:text-white/80"
          [class.border-aquamarine]="action.color === 'aquamarine'"
          [class.text-aquamarine]="action.color === 'aquamarine'"
          [class.bg-peachy-maroney]="action.color === 'peachy-maroney'"
          [class.text-white]="action.color === 'peachy-maroney'"
          [class.uppercase]="action.type === 'donate'"
          (click)="onClick(action.type)"
        >
          {{ action.label }}
        </button>
      </li>
    }
  </ul>
</nav>
