<section class="flex w-full flex-col p-6">
  <div class="my-3 grid grid-cols-[1fr_auto_1fr] items-center">
    <span></span>
    <img class="justify-self-center" src="images/giftpet-logo.svg" alt="Giftpet logo"/>
    <p-button class="justify-self-end" icon="pi pi-times" aria-label="Close" (onClick)="close()" />
  </div>
  <form class="flex w-full flex-col gap-3" [formGroup]="loginForm" (ngSubmit)="submit()">
    <p-iftalabel>
        <label for="email">Email</label>
        <input pInputText type="email" formControlName="email" placeholder="Email" class="w-full [--p-inputtext-background:transparent]" />
      </p-iftalabel>
      <p-iftalabel>
        <label for="password">Senha</label>
        <input pInputText type="password" formControlName="password" placeholder="Senha" class="w-full [--p-inputtext-background:transparent]" />
      </p-iftalabel>
    <p-button
      class="w-full"
      styleClass="w-full"
      label="Entrar"
      type="submit"
      [disabled]="isSubmitting || loginForm.invalid"
      size="large"
    />
  </form>
</section>
